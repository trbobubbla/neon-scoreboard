name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what happened
    validations:
      required: true
  - type: input
    id: match-url
    attributes:
      label: Match URL
      description: The ESSPortal match URL you were using (if applicable)
      placeholder: https://portal.ipscess.org/portal/match/...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Any relevant server console output
      render: shell
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04
